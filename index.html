<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Fila de Aposentadoria</h1>

<form id="formulario">
    <label for="nome">Nome Completo:</label>
    <input type="text" id="nome" required>

    <label for="sexo">Sexo:</label>
    <select id="sexo" required>
        <option value="">Selecione...</option>
        <option value="F">Feminino</option>
        <option value="M">Masculino</option>
    </select>

    <label for="dataNascimento">Data de Nascimento:</label>
    <input type="date" id="dataNascimento" required>

    <label for="dataAdmissao">Data de Admissão:</label>
    <input type="date" id="dataAdmissao" required>

    <label>Tempo Averbado:</label>
    <div class="grupo-averbado">
        <input type="number" id="anosAverbados" placeholder="Anos" min="0" value="0" required>
        <input type="number" id="mesesAverbados" placeholder="Meses" min="0" max="11" value="0" required>
        <input type="number" id="diasAverbados" placeholder="Dias" min="0" max="30" value="0" required>
    </div>

    <button type="submit">Salvar Registro</button>
</form>

<h2>Registros Salvos</h2>
<ul id="listaDados"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
